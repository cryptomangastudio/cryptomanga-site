<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  *{box-sizing:border-box;font-family:'IPAPGothic','IPAGothic',sans-serif}
  .stage{width:640px;height:640px;position:relative;overflow:hidden;background:#EFEDE6;color:#26241E;
    background-image:linear-gradient(#E3E0D6 1px,transparent 1px),linear-gradient(90deg,#E3E0D6 1px,transparent 1px);
    background-size:53px 53px;}
  .name{position:absolute;left:0;right:0;top:50%;transform:translateY(-52%);text-align:center;
    font-size:168px;font-weight:800;line-height:1.0;letter-spacing:6px;}
  .under{position:absolute;left:110px;right:110px;bottom:150px;height:0;}
  .under svg{position:absolute;left:0;top:-20px;width:100%;height:60px;overflow:visible;}
</style></head><body>
  <div class="stage">
    <div class="name">軌道<br>キャリ</div>
    <div class="under"><svg viewBox="0 0 420 60" preserveAspectRatio="none">
      <path d="M6,34 C120,52 300,10 414,30" fill="none" stroke="#B0392C" stroke-width="12" stroke-linecap="round"/>
    </svg></div>
  </div>
</body></html>
