<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  *{box-sizing:border-box;font-family:'IPAPGothic','IPAGothic',sans-serif}
  .stage{width:1920px;height:1006px;position:relative;overflow:hidden;color:#F4EFE6;
    background:linear-gradient(150deg,#1e2f45 0%,#16202e 52%,#0d1521 100%);}
  .crack{position:absolute;inset:0;width:100%;height:100%;}
  .eyebrow{position:absolute;top:210px;left:0;right:0;text-align:center;color:#C9A24B;
    letter-spacing:22px;font-size:40px;font-weight:700;}
  .main{position:absolute;top:320px;left:120px;right:120px;text-align:center;
    font-size:118px;font-weight:800;line-height:1.3;text-shadow:0 6px 26px rgba(0,0,0,.5);}
  .main .g{color:#C9A24B;}
  .sub{position:absolute;top:640px;left:0;right:0;text-align:center;font-size:40px;
    color:#cdd8e6;font-weight:600;letter-spacing:2px;line-height:1.6;}
  .author{position:absolute;bottom:104px;right:120px;font-size:42px;font-weight:800;letter-spacing:4px;}
  .author small{color:#9FB0C3;font-size:26px;font-weight:600;margin-left:16px;letter-spacing:2px;}
  /* note左下のアイコン重なり安全域 */
  .safe{position:absolute;left:0;bottom:0;width:520px;height:300px;}
</style></head><body>
  <div class="stage">
    <svg class="crack" viewBox="0 0 1920 1006" preserveAspectRatio="none" aria-hidden="true">
      <path d="M-30,260 L360,380 L200,540 L560,660 L400,820" fill="none" stroke="#C9A24B" stroke-width="3.5" opacity=".45"/>
      <path d="M1950,220 L1560,340 L1720,520 L1420,640 L1600,860" fill="none" stroke="#C9A24B" stroke-width="3" opacity=".33"/>
    </svg>
    <div class="eyebrow">消耗しない所得の増やし方</div>
    <div class="main">副業で1000万稼いで、<br><span class="g">700万</span>溶かした。</div>
    <div class="sub">その遠回りの全部を、正直に書いています。</div>
    <div class="author">軌道キャリ<small>CryptoManga Studios</small></div>
  </div>
</body></html>
