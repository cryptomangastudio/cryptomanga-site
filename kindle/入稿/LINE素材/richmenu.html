<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  *{box-sizing:border-box;font-family:'IPAPGothic','IPAGothic',sans-serif}
  .stage{width:2500px;height:843px;display:flex;color:#F4EFE6;
    background:linear-gradient(160deg,#1e2f45 0%,#16202e 55%,#0d1521 100%);}
  .cell{flex:1 1 0;height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;position:relative;}
  .cell + .cell{border-left:2px solid rgba(201,162,75,.35);}
  .ico{width:180px;height:180px;margin-bottom:34px;}
  .ico svg{width:100%;height:100%;}
  .lbl{font-size:74px;font-weight:800;letter-spacing:4px;}
  .sub{margin-top:16px;font-size:34px;color:#9FB0C3;font-weight:600;letter-spacing:2px;}
  .bar{position:absolute;bottom:70px;width:120px;height:8px;background:#C9A24B;border-radius:4px;}
  .g{stroke:#C9A24B;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .gf{fill:#C9A24B;}
</style></head><body>
  <div class="stage">
    <div class="cell">
      <div class="ico"><svg viewBox="0 0 100 100">
        <rect class="g" x="18" y="40" width="64" height="44" rx="4"/>
        <path class="g" d="M14,40 h72 v14 h-72 z"/>
        <path class="g" d="M50,40 V84"/>
        <path class="g" d="M50,40 C50,26 34,22 32,32 C30,40 44,40 50,40 Z"/>
        <path class="g" d="M50,40 C50,26 66,22 68,32 C70,40 56,40 50,40 Z"/>
      </svg></div>
      <div class="lbl">特典を受け取る</div>
      <div class="sub">PDFチェックリスト</div>
      <div class="bar"></div>
    </div>
    <div class="cell">
      <div class="ico"><svg viewBox="0 0 100 100">
        <path class="g" d="M50,26 C40,20 24,20 18,24 V78 C24,74 40,74 50,80"/>
        <path class="g" d="M50,26 C60,20 76,20 82,24 V78 C76,74 60,74 50,80"/>
        <path class="g" d="M50,26 V80"/>
      </svg></div>
      <div class="lbl">本を読む</div>
      <div class="sub">Kindleシリーズ一覧</div>
      <div class="bar"></div>
    </div>
    <div class="cell">
      <div class="ico"><svg viewBox="0 0 100 100">
        <rect class="g" x="22" y="20" width="56" height="60" rx="6"/>
        <path class="g" d="M32,36 h36 M32,50 h36 M32,64 h22"/>
        <path class="gf" d="M70,60 l14,14 l-8,8 l-14,-14 z" opacity="0.9"/>
      </svg></div>
      <div class="lbl">noteを読む</div>
      <div class="sub">続き・体験談</div>
      <div class="bar"></div>
    </div>
  </div>
</body></html>
