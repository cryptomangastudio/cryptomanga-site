<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  *{box-sizing:border-box;font-family:'IPAPGothic','IPAGothic',sans-serif}
  .stage{width:1080px;height:878px;position:relative;overflow:hidden;color:#26241E;
    background:#EFEDE6;
    background-image:linear-gradient(#E3E0D6 1px,transparent 1px),linear-gradient(90deg,#E3E0D6 1px,transparent 1px);
    background-size:44px 44px;}
  .kicker{position:absolute;top:64px;left:0;right:0;text-align:center;
    font-size:22px;letter-spacing:10px;color:#8A8474;font-weight:700;}
  h1{position:absolute;top:130px;left:60px;right:60px;text-align:center;margin:0;
    font-size:70px;font-weight:800;line-height:1.32;letter-spacing:.01em;}
  h1 .r{color:#B0392C;}
  .ledger{position:absolute;left:90px;right:90px;top:430px;
    border-top:2px solid #26241E;border-bottom:2px solid #26241E;padding:20px 0;}
  .row{display:flex;align-items:baseline;font-size:24px;margin:0 0 13px;font-weight:600;}
  .row .dot{flex:1;border-bottom:2px dotted #B8B3A4;margin:0 10px;transform:translateY(-5px);}
  .row .num{font-variant-numeric:tabular-nums;font-weight:800;white-space:nowrap;}
  .rule{border-top:2px solid #C7C2B4;margin:10px 0 15px;}
  .total{display:flex;align-items:baseline;justify-content:space-between;font-size:26px;font-weight:800;}
  .total .aka{color:#B0392C;font-size:40px;position:relative;padding:0 6px;}
  .total .aka::after{content:"";position:absolute;left:-12px;right:-12px;top:-8px;bottom:-4px;
    border:3px solid #B0392C;border-radius:48% 52% 50% 50%/60% 55% 45% 40%;transform:rotate(-3deg);}
  .safe{position:absolute;left:0;right:0;bottom:0;height:220px;
    background:linear-gradient(to top, rgba(239,237,230,.9), rgba(239,237,230,0));}
</style></head><body>
  <div class="stage">
    <div class="kicker">消耗しない所得の増やし方</div>
    <h1>稼いだ額より、<span class="r">失った</span>ほうが、多かった。</h1>
    <div class="ledger">
      <div class="row"><span>副業でかき集めた稼ぎ</span><span class="dot"></span><span class="num">＋1000万</span></div>
      <div class="row"><span>仮想通貨のレバレッジ</span><span class="dot"></span><span class="num">−700万</span></div>
      <div class="row"><span>教材・スクール</span><span class="dot"></span><span class="num">−300万超</span></div>
      <div class="rule"></div>
      <div class="total"><span>差引き、手元に</span><span class="aka">赤字</span></div>
    </div>
    <div class="safe"></div>
  </div>
</body></html>
