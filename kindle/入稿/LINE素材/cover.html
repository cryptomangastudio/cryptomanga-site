<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  *{box-sizing:border-box;font-family:'IPAPGothic','IPAGothic',sans-serif}
  .stage{width:1080px;height:878px;position:relative;overflow:hidden;color:#F4EFE6;
    background:linear-gradient(160deg,#1e2f45 0%,#16202e 50%,#0d1521 100%);}
  /* 金継ぎ風の金線 */
  .crack{position:absolute;top:0;left:0;width:100%;height:100%;}
  .label{position:absolute;top:70px;left:0;right:0;text-align:center;color:#C9A24B;
    letter-spacing:14px;font-size:29px;font-weight:700;}
  .title{position:absolute;top:168px;left:70px;right:70px;text-align:center;
    font-size:100px;font-weight:800;line-height:1.26;text-shadow:0 6px 22px rgba(0,0,0,.5);}
  .title .accent{color:#C9A24B;}
  .tag{position:absolute;top:486px;left:90px;right:90px;text-align:center;
    font-size:32px;line-height:1.7;color:#cdd8e6;font-weight:600;}
  .author{position:absolute;top:606px;left:0;right:0;text-align:center;font-size:30px;
    color:#F4EFE6;font-weight:800;letter-spacing:4px;}
  .author small{color:#9FB0C3;font-size:22px;font-weight:600;letter-spacing:2px;margin-left:14px;}
  /* LINEがホーム下部にアイコン＋アカウント名を重ねる領域（目安）：ここには文字を置かない */
  .safe{position:absolute;left:0;right:0;bottom:0;height:200px;
    background:linear-gradient(to top, rgba(8,13,22,.55), rgba(8,13,22,0));}
</style></head><body>
  <div class="stage">
    <svg class="crack" viewBox="0 0 1080 878" preserveAspectRatio="none">
      <path d="M-20,150 L230,300 L120,470 L360,560 L250,720 L560,820"
        fill="none" stroke="#C9A24B" stroke-width="3" opacity="0.5"/>
      <path d="M1100,120 L860,250 L980,410 L760,520 L900,690"
        fill="none" stroke="#C9A24B" stroke-width="2.5" opacity="0.35"/>
    </svg>
    <div class="label">Ｋｉｎｄｌｅ シリーズ</div>
    <div class="title">消耗しない<br><span class="accent">所得</span>の増やし方</div>
    <div class="tag">1000万稼いで700万溶かした僕が、<br>遠回りせず所得を増やす道を、正直に。</div>
    <div class="author">軌道キャリ<small>CryptoManga Studios</small></div>
    <div class="safe"></div>
  </div>
</body></html>
