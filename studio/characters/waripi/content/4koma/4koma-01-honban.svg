<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1700" font-family="'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif">
  <defs>
    <style>
      .ol{fill:none;stroke:#6b5d4d;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;}
      .olt{fill:none;stroke:#6b5d4d;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;}
      .body{fill:#f4ecd6;}
      .blush{fill:#f3b3bd;}
      .eye{fill:#4a4038;}
      .pnl{fill:#fffdf8;stroke:#6b5d4d;stroke-width:4;}
      .bub{fill:#ffffff;stroke:#6b5d4d;stroke-width:3;}
      .tx{fill:#4a4038;font-size:24px;font-weight:700;}
      .se{fill:#b8a892;font-size:22px;font-weight:800;}
      .num{fill:#c9a24a;font-size:26px;font-weight:800;}
    </style>
    <path id="wb" d="M0,-60 C38,-56 52,14 44,38 C39,52 22,57 0,57 C-22,57 -39,52 -44,38 C-52,14 -38,-56 0,-60 Z"/>
  </defs>

  <rect width="600" height="1700" fill="#fbf7ee"/>
  <text x="34" y="46" class="tx" font-size="28">わりぴ　#1「本番」</text>

  <!-- ============ P1 ============ -->
  <g transform="translate(0,66)">
    <rect x="30" y="0" width="540" height="360" rx="10" class="pnl"/>
    <text x="52" y="40" class="num">1</text>
    <!-- shelf -->
    <rect x="60" y="250" width="480" height="14" rx="4" fill="#e8dcc2"/>
    <!-- 定価パンたち being lifted away (top-right hand) -->
    <g transform="translate(430,120)">
      <rect x="-14" y="-70" width="46" height="60" rx="18" fill="#f4ecd6"/><rect x="-14" y="-70" width="46" height="60" rx="18" class="olt"/>
      <ellipse cx="8" cy="14" rx="34" ry="26" fill="#e9b877"/><ellipse cx="8" cy="14" rx="34" ry="26" class="olt"/>
    </g>
    <ellipse cx="360" cy="235" rx="30" ry="22" fill="#e9b877"/><ellipse cx="360" cy="235" rx="30" ry="22" class="olt"/>
    <ellipse cx="300" cy="238" rx="28" ry="20" fill="#e9b877"/><ellipse cx="300" cy="238" rx="28" ry="20" class="olt"/>
    <text x="330" y="150" class="se" transform="rotate(-8 330 150)">ひょい</text>
    <!-- waripi small at left, looking up -->
    <g transform="translate(150,196) scale(0.92)">
      <g transform="translate(40,6) rotate(14)"><rect x="-3" y="-16" width="42" height="32" rx="7" fill="#ef6a2e"/><rect x="-3" y="-16" width="42" height="32" rx="7" class="olt"/></g>
      <use href="#wb" class="body"/><use href="#wb" class="ol"/>
      <circle cx="-13" cy="-8" r="4.5" class="eye"/><circle cx="13" cy="-8" r="4.5" class="eye"/>
      <ellipse cx="-22" cy="6" rx="7" ry="4.5" class="blush"/><ellipse cx="22" cy="6" rx="7" ry="4.5" class="blush"/>
      <path class="olt" d="M-5,8 q5,3 10,0"/>
    </g>
    <!-- bubble (above waripi's head so face stays visible) -->
    <g>
      <rect x="64" y="96" width="172" height="48" rx="16" class="bub"/>
      <path d="M120,142 l12,20 l6,-20 z" class="bub"/>
      <text x="150" y="127" text-anchor="middle" class="tx" font-size="21">…いってらっしゃい</text>
    </g>
  </g>

  <!-- ============ P2 ============ -->
  <g transform="translate(0,462)">
    <rect x="30" y="0" width="540" height="360" rx="10" class="pnl"/>
    <rect x="30" y="0" width="540" height="360" rx="10" fill="#4a4a66" opacity="0.10"/>
    <text x="52" y="40" class="num">2</text>
    <text x="470" y="52" class="se">よる</text>
    <!-- empty shelf -->
    <rect x="60" y="250" width="480" height="14" rx="4" fill="#e0d4ba"/>
    <!-- waripi center holding daishi (backing paper) -->
    <g transform="translate(300,196)">
      <g transform="translate(40,6) rotate(14)"><rect x="-3" y="-16" width="42" height="32" rx="7" fill="#ef6a2e"/><rect x="-3" y="-16" width="42" height="32" rx="7" class="olt"/></g>
      <use href="#wb" class="body"/><use href="#wb" class="ol"/>
      <!-- holding a small white backing paper -->
      <rect x="-58" y="20" width="26" height="20" rx="4" fill="#ffffff"/><rect x="-58" y="20" width="26" height="20" rx="4" class="olt"/>
      <path class="olt" d="M-44,24 q-8,4 -14,0"/>
      <path class="olt" d="M-22,-4 q7,-7 14,0"/><path class="olt" d="M8,-4 q7,-7 14,0"/>
      <ellipse cx="-24" cy="8" rx="7" ry="4.5" class="blush"/><ellipse cx="24" cy="8" rx="7" ry="4.5" class="blush"/>
      <path class="olt" d="M-4,12 q4,-3 8,0"/>
    </g>
    <!-- thought bubble -->
    <g>
      <rect x="300" y="120" width="240" height="56" rx="26" class="bub"/>
      <circle cx="316" cy="188" r="9" class="bub"/><circle cx="300" cy="206" r="6" class="bub"/>
      <text x="420" y="155" text-anchor="middle" class="tx" font-size="20">まあ、そういうもんだよね</text>
    </g>
  </g>

  <!-- ============ P3 (hero) ============ -->
  <g transform="translate(0,858)">
    <rect x="30" y="0" width="540" height="360" rx="10" class="pnl"/>
    <text x="52" y="40" class="num">3</text>
    <text x="452" y="52" class="se">19:30</text>
    <!-- glow lines -->
    <g stroke="#f4a03a" stroke-width="6" stroke-linecap="round" opacity="0.9">
      <path d="M300,70 v-26"/><path d="M230,96 l-16,-20"/><path d="M370,96 l16,-20"/>
      <path d="M198,150 l-24,-8"/><path d="M402,150 l24,-8"/><path d="M214,214 l-22,10"/><path d="M386,214 l22,10"/>
    </g>
    <!-- sticker gun from right -->
    <g transform="translate(452,150)">
      <rect x="0" y="-14" width="70" height="34" rx="7" fill="#cfe0e6"/><rect x="0" y="-14" width="70" height="34" rx="7" class="olt"/>
      <rect x="20" y="18" width="18" height="34" rx="5" fill="#cfe0e6"/><rect x="20" y="18" width="18" height="34" rx="5" class="olt"/>
      <rect x="-16" y="-10" width="18" height="26" rx="4" fill="#ef6a2e"/><rect x="-16" y="-10" width="18" height="26" rx="4" class="olt"/>
    </g>
    <text x="404" y="120" class="se" fill="#ef6a2e" transform="rotate(-6 404 120)">ピッ</text>
    <!-- waripi big, glowing, powatt face -->
    <g transform="translate(300,168) scale(1.28)">
      <g transform="translate(40,6) rotate(14)"><rect x="-3" y="-16" width="42" height="32" rx="7" fill="#ef6a2e"/><rect x="-3" y="-16" width="42" height="32" rx="7" class="olt"/></g>
      <use href="#wb" class="body"/><use href="#wb" class="ol"/>
      <path d="M-20,-10 l3,-8 l3,8 z" fill="#4a4038"/><circle cx="-14" cy="-6" r="4.8" class="eye"/>
      <path d="M8,-10 l3,-8 l3,8 z" fill="#4a4038"/><circle cx="14" cy="-6" r="4.8" class="eye"/>
      <ellipse cx="-24" cy="8" rx="8" ry="5" class="blush"/><ellipse cx="24" cy="8" rx="8" ry="5" class="blush"/>
      <ellipse cx="0" cy="10" rx="5" ry="6" fill="#4a4038"/>
    </g>
    <!-- bubble -->
    <g>
      <rect x="60" y="238" width="250" height="54" rx="16" class="bub"/>
      <path d="M150,290 l14,20 l6,-20 z" class="bub"/>
      <text x="185" y="272" text-anchor="middle" class="tx" font-size="21">…わたし、ここからなんだ</text>
    </g>
  </g>

  <!-- ============ P4 ============ -->
  <g transform="translate(0,1254)">
    <rect x="30" y="0" width="540" height="360" rx="10" class="pnl"/>
    <text x="52" y="40" class="num">4</text>
    <!-- basket bottom-right -->
    <path d="M436,300 l108,0 l-14,44 l-80,0 z" fill="#e8dcc2"/><path d="M436,300 l108,0 l-14,44 l-80,0 z" class="olt"/>
    <!-- hand from top taking the 3-waribiki (yellow) toward basket -->
    <g transform="translate(360,150)">
      <rect x="-14" y="-78" width="46" height="60" rx="18" fill="#f4ecd6"/><rect x="-14" y="-78" width="46" height="60" rx="18" class="olt"/>
      <ellipse cx="8" cy="8" rx="30" ry="24" fill="#e9b877"/><ellipse cx="8" cy="8" rx="30" ry="24" class="olt"/>
    </g>
    <!-- 3割引 friend (yellow tag) being carried, small, toward basket -->
    <g transform="translate(392,182) scale(0.66)">
      <g transform="translate(40,6) rotate(14)"><rect x="-3" y="-16" width="42" height="32" rx="7" fill="#f4b400"/><rect x="-3" y="-16" width="42" height="32" rx="7" class="olt"/></g>
      <use href="#wb" class="body"/><use href="#wb" class="ol"/>
      <path class="olt" d="M-22,-6 q7,7 14,0"/><path class="olt" d="M8,-6 q7,7 14,0"/>
      <ellipse cx="-24" cy="8" rx="7" ry="4.5" class="blush"/><ellipse cx="24" cy="8" rx="7" ry="4.5" class="blush"/>
    </g>
    <text x="300" y="96" class="se" transform="rotate(-6 300 96)">…そっち？</text>
    <!-- waripi left, back on shelf, maa-ikka + sweat -->
    <rect x="70" y="288" width="180" height="12" rx="4" fill="#e8dcc2"/>
    <g transform="translate(150,232)">
      <g transform="translate(40,6) rotate(14)"><rect x="-3" y="-16" width="42" height="32" rx="7" fill="#ef6a2e"/><rect x="-3" y="-16" width="42" height="32" rx="7" class="olt"/></g>
      <use href="#wb" class="body"/><use href="#wb" class="ol"/>
      <path class="olt" d="M-22,-4 q9,7 18,0"/><path class="olt" d="M4,-4 q9,7 18,0"/>
      <ellipse cx="-24" cy="8" rx="7.5" ry="5" class="blush"/><ellipse cx="24" cy="8" rx="7.5" ry="5" class="blush"/>
      <path class="olt" d="M-5,10 q5,4 10,0"/>
      <path d="M34,-20 q6,8 0,14 q-6,-6 0,-14z" fill="#bcd7e6"/>
    </g>
    <!-- bubble -->
    <g>
      <rect x="60" y="140" width="200" height="52" rx="16" class="bub"/>
      <path d="M120,190 l14,20 l6,-20 z" class="bub"/>
      <text x="160" y="174" text-anchor="middle" class="tx" font-size="22">……まあ、いっか</text>
    </g>
  </g>
</svg>
